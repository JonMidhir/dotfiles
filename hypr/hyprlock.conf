background {
    monitor =
    path = screenshot
    blur_size = 7
    blur_passes = 3
    brightness = 0.5
}

animations {
    enabled = false
}

input-field {
    monitor =
    size = 650, 100
    position = 0, 0
    halign = center
    valign = center

    inner_color = rgba(1e1e2e99)
    outer_color = rgba(89b4fa99)
    outline_thickness = 1

    font_family = JetBrainsMono Nerd Font
    font_color = rgb(cdd6f4)

    placeholder_text = <span foreground="##cdd6f4">Enter Password</span>

    rounding = 16
    shadow_passes = 0
    fade_on_empty = false
    dots_center = true
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    color = rgba(cdd6f4ee)
    position = 0, 160
    halign = center
    valign = center
}
